<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCare – Worker Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a227; --gold-dim: #8a6e1a;
    --dark: #0a0a0a; --dark3: #1a1a1a; --dark4: #222;
    --text: #d4d4d4; --text-dim: #888; --white: #fff;
  }
  html, body { min-height: 100%; background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle { position: absolute; bottom: -10px; width: 2px; height: 2px; background: var(--gold); border-radius: 50%; opacity: 0; animation: rise linear infinite; }
  @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.2; } 100% { transform: translateY(-100vh) scale(0); opacity: 0; } }

  .loading-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s, visibility 0.6s; }
  .loading-screen.hidden { opacity: 0; visibility: hidden; }
  .car-loader { width: 60px; height: 60px; border: 3px solid var(--dark3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }

  .hero-label { font-family: 'Oswald', sans-serif; font-size: clamp(10px, 1.2vw, 13px); letter-spacing: 6px; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; opacity: 0; animation: fadeUp 0.8s 0.3s forwards; }
  .big-name { font-family: 'Oswald', sans-serif; font-size: clamp(42px, 8vw, 90px); font-weight: 700; line-height: 0.88; color: var(--white); text-align: center; letter-spacing: -1px; opacity: 0; animation: fadeUp 0.8s 0.5s forwards; }
  .big-name span { color: var(--gold); display: block; }
  .divider { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 24px auto; opacity: 0; animation: fadeUp 0.8s 0.7s forwards; }
  .subtitle { font-size: 15px; letter-spacing: 2px; color: var(--text-dim); text-align: center; text-transform: uppercase; margin-bottom: 50px; opacity: 0; animation: fadeUp 0.8s 0.9s forwards; }

  /* Form card */
  .form-card { position: relative; width: 100%; max-width: 480px; background: var(--dark3); border: 1px solid #2a2a2a; padding: 50px 44px; overflow: hidden; opacity: 0; animation: fadeUp 0.8s 1.1s forwards; }
  .form-card::before { content: ''; position: absolute; top: 0; left: 0; width: 40px; height: 40px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .form-card::after { content: ''; position: absolute; bottom: 0; right: 0; width: 40px; height: 40px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  .card-heading { display: flex; align-items: center; gap: 16px; margin-bottom: 38px; }
  .card-heading-icon { width: 54px; height: 54px; border: 1px solid var(--gold-dim); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--gold); background: rgba(201,162,39,0.06); flex-shrink: 0; }
  .card-heading-text .role { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; letter-spacing: 3px; color: var(--white); text-transform: uppercase; }
  .card-heading-text .desc { font-size: 13px; color: var(--text-dim); letter-spacing: 0.5px; margin-top: 3px; }

  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .field label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); font-family: 'Oswald', sans-serif; }

  .input-wrap { position: relative; }
  .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; transition: color 0.2s; }
  .input-wrap input { width: 100%; background: var(--dark4); border: 1px solid #2e2e2e; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; padding: 13px 16px 13px 42px; outline: none; transition: border-color 0.25s, background 0.25s; }
  .input-wrap input:focus { border-color: var(--gold); background: #1e1e1e; }
  .input-wrap input:focus + i,
  .input-wrap input:focus ~ i { color: var(--gold); }
  .input-wrap .icon-left { pointer-events: none; }

  /* Password toggle */
  .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; cursor: pointer; transition: color 0.2s; background: none; border: none; padding: 0; }
  .toggle-pw:hover { color: var(--gold); }

  .btn-submit { width: 100%; margin-top: 10px; padding: 14px; background: var(--gold); border: 1px solid var(--gold); color: var(--dark); font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: background 0.25s, box-shadow 0.25s; }
  .btn-submit:hover { background: #e0b83a; box-shadow: 0 0 30px rgba(201,162,39,0.25); }

  .form-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-dim); letter-spacing: 0.5px; }
  .form-footer a { color: var(--gold); text-decoration: none; transition: opacity 0.2s; }
  .form-footer a:hover { opacity: 0.8; }

  .back-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 40px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; opacity: 0; animation: fadeUp 0.8s 1.4s forwards; transition: color 0.2s; }
  .back-link:hover { color: var(--gold); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 520px) { .form-card { padding: 36px 22px; } }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="car-loader"></div></div>
<div id="particles"></div>

<main class="page">
  <div class="hero-label">Motor Vehicle Service Excellence</div>
  <div class="big-name">AUTO<span>CARE</span></div>
  <div class="divider"></div>
  <p class="subtitle">ADMIN Portal</p>

  <div class="form-card">
    <div class="card-heading">
      <div class="card-heading-icon"><i class="fas fa-wrench"></i></div>
      <div class="card-heading-text">
        <div class="role">Register</div>
        <div class="desc">Create your workshop account</div>
      </div>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope icon-left"></i>
          <input type="text" id="email" name="username" maxlength="50" placeholder="your@email.com" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock icon-left"></i>
          <input type="password" id="password" name="password" maxlength="100" placeholder="Enter a strong password" required>
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <i class="fas fa-user-plus" style="margin-right:10px;"></i>Create Account
      </button>
    </form>

    <div class="form-footer">
   
    </div>
  </div>

  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i>Back to Home</a>
</main>

<script>
  window.addEventListener('load', () => setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 1200));

  function togglePw() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('pwIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

  (function(){ const c = document.getElementById('particles'); for(let i=0;i<60;i++){ const p=document.createElement('div'); p.className='particle'; p.style.left=Math.random()*100+'%'; p.style.width=(1+Math.random()*2)+'px'; p.style.height=p.style.width; p.style.animationDuration=(12+Math.random()*14)+'s'; p.style.animationDelay=(Math.random()*12)+'s'; c.appendChild(p); } })();
</script>
</body>
</html>
