<!DOCTYPE html>
{%load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Motor Vehicle Service Excellence</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'styles.css' %}">

</head>
<body>
<!-- Preloader -->
<div id="splash">
    <div class="splash-content">
        <i class="fas fa-car"></i>
        <h1>AUTOCARE</h1>
    </div>
</div>

<!-- Navbar -->


<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="container page-content" id="pageContent" style="grid-template-columns: 1fr; max-width: 500px; margin: 0 auto;">

    <div style="text-align: center;">
        <div class="big-name" style="font-size: 60px; line-height: 60px;">
            WELCOME<br>BACK
        </div>
    </div>

    <div>
        <div class="section-title">SIGN IN</div>
        <div class="divider"></div>
        <div class="text">
            Access your account to manage appointments, view service history, and access exclusive member benefits.
        </div>
    </div>

    <div>
        <div class="form-container">
            <form action="/login/" method="POST"id="loginForm">
            {% csrf_token %}
                <div class="form-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="remember" name="remember" style="width: auto;">
                        <span style="color: #bfbfbf; font-size: 14px;">Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">SIGN IN</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <p style="color: #bfbfbf; font-size: 14px;">
                    <a href="/forgotpassword/  " style="color: #c9a227; text-decoration: none;">Forgot Password?</a>
                </p>
                <p style="color: #bfbfbf; font-size: 14px; margin-top: 10px;">
                    Don't have an account? 
                    <a href="/register/" style="color: #c9a227; text-decoration: none;">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

</div>

<script>
window.addEventListener("load", function () {
    const splash = document.getElementById("splash");
    const pageContent = document.getElementById("pageContent");

    // Hide main content initially
    if (pageContent) {
        pageContent.style.opacity = "0";
    }

    setTimeout(() => {
        splash.style.opacity = "0";
        splash.style.transition = "opacity 0.6s ease";

        setTimeout(() => {
            splash.style.display = "none";

            // Show page smoothly
            if (pageContent) {
                pageContent.style.opacity = "1";
                pageContent.classList.add("loaded");
            }

            document.body.classList.add("loaded");

        }, 600);

    }, 2000); // ⏱️ splash duration (2 sec)
});
function createParticles() {
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (10 + Math.random() * 10) + 's';
        particlesContainer.appendChild(particle);
    }
}

// Show notification function
function showNotification(message, type = 'info') {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        background: ${type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#c9a227'};
        color: white;
        border-radius: 5px;
        z-index: 10000;
        animation: slideIn 0.3s ease;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    `;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

// Handle login form submission

// Smooth page transitions
document.addEventListener('DOMContentLoaded', function() {
    // Add click handlers to navigation links
    const navLinks = document.querySelectorAll('.nav-links a');
    
    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            const href = this.getAttribute('href');
            
            // Only apply transition for internal pages
            if (href && href !== '#' && !href.startsWith('http') && !href.startsWith('mailto:') && !href.startsWith('tel:')) {
                e.preventDefault();
                
                // Add exit animation
                document.body.classList.add('page-exit');
                
                // Navigate after animation
                setTimeout(() => {
                    window.location.href = href;
                }, 500);
            }
        });
    });

    // Trigger page content animation
    const pageContent = document.getElementById('pageContent');
    if (pageContent) {
        setTimeout(() => {
            pageContent.classList.add('loaded');
        }, 100);
    }
});

function createParticles() {
    const particlesContainer = document.getElementById('particles');
    if (particlesContainer) {
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    }
}

createParticles();
// Hide preloader after page loads

</script>

</body>
<!-- Preloader -->

</html>
