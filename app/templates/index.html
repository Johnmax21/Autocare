<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCare - Login Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a227;
    --gold-dim: #8a6e1a;
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --dark4: #222222;
    --text: #d4d4d4;
    --text-dim: #888;
    --white: #ffffff;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  /* ── Particles ── */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    bottom: -10px;
    width: 2px;
    height: 2px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(1);   opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-100vh) scale(0); opacity: 0; }
  }

  /* ── Loading Screen ── */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  .loading-screen.hidden { opacity: 0; visibility: hidden; }
  .car-loader {
    width: 60px;
    height: 60px;
    border: 3px solid var(--dark3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Page wrapper ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  /* ── Hero text ── */
  .hero-label {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(10px, 1.2vw, 13px);
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

  .big-name {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(52px, 10vw, 120px);
    font-weight: 700;
    line-height: 0.88;
    color: var(--white);
    text-align: center;
    letter-spacing: -1px;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }
  .big-name span {
    color: var(--gold);
    display: block;
  }

  .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px auto;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .subtitle {
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 60px;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  /* ── Cards grid ── */
  .cards {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.8s 1.1s forwards;
  }

  .login-card {
    position: relative;
    width: 240px;
    background: var(--dark3);
    border: 1px solid #2a2a2a;
    padding: 44px 30px 38px;
    text-align: center;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  /* Corner accent */
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 30px; height: 30px;
    border-top: 2px solid var(--gold);
    border-left: 2px solid var(--gold);
    transition: width 0.3s, height 0.3s;
  }
  .login-card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 30px; height: 30px;
    border-bottom: 2px solid var(--gold);
    border-right: 2px solid var(--gold);
    transition: width 0.3s, height 0.3s;
  }

  .login-card:hover {
    transform: translateY(-8px);
    border-color: var(--gold-dim);
    box-shadow: 0 20px 60px rgba(201,162,39,0.12), 0 4px 20px rgba(0,0,0,0.6);
  }
  .login-card:hover::before,
  .login-card:hover::after {
    width: 60px; height: 60px;
  }

  /* Shimmer sweep on hover */
  .login-card .shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(201,162,39,0.05) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .login-card:hover .shimmer { transform: translateX(100%); }

  .card-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 22px;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: var(--gold);
    background: rgba(201,162,39,0.06);
    transition: background 0.3s, transform 0.3s;
  }
  .login-card:hover .card-icon {
    background: rgba(201,162,39,0.14);
    transform: scale(1.08);
  }

  .card-role {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .card-btn {
    display: inline-block;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
    width: 100%;
  }
  .login-card:hover .card-btn {
    background: var(--gold);
    color: var(--dark);
  }

  /* Gold filled variant for admin */
  .login-card.admin .card-icon {
    border-color: #e0c04f;
    color: #e0c04f;
  }
  .login-card.admin::before,
  .login-card.admin::after {
    border-color: #e0c04f;
  }
  .login-card.admin .card-btn {
    border-color: #e0c04f;
    color: #e0c04f;
  }
  .login-card.admin:hover .card-btn {
    background: #e0c04f;
    color: var(--dark);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Back link */
  .back-link {
    margin-top: 52px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 0.8s 1.4s forwards;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }
  .back-link i { margin-right: 8px; }

  /* Responsive */
  @media (max-width: 600px) {
    .login-card { width: 100%; max-width: 320px; }
    .cards { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="car-loader"></div>
</div>

<!-- Particles -->
<div id="particles"></div>

<!-- Page -->
<main class="page">
  <div class="hero-label">Motor Vehicle Service Excellence</div>

  <div class="big-name">
    AUTO<span>CARE</span>
  </div>

  <div class="divider"></div>
  <p class="subtitle">Select your login portal to continue</p>

  <!-- 3 Login Cards -->
  <div class="cards">

    <!-- User -->
    <a href="/login/" class="login-card">
      <div class="shimmer"></div>
      <div class="card-icon"><i class="fas fa-user"></i></div>
      <div class="card-role">User</div>
      <div class="card-desc">Book services, track repairs &amp; manage your vehicles</div>
      <div class="card-btn">Login</div>
    </a>

    <!-- Worker -->
    <a href="/wlogin/" class="login-card">
      <div class="shimmer"></div>
      <div class="card-icon"><i class="fas fa-wrench"></i></div>
      <div class="card-role">Worker</div>
      <div class="card-desc">Access your workshop dashboard &amp; job assignments</div>
      <div class="card-btn">Login</div>
    </a>

    <!-- Admin -->
    <a href="/adminlogin/" class="login-card admin">
      <div class="shimmer"></div>
      <div class="card-icon"><i class="fas fa-shield-halved"></i></div>
      <div class="card-role">Admin</div>
      <div class="card-desc">Manage the platform, users &amp; all workshop data</div>
      <div class="card-btn">Login</div>
    </a>

  </div>

  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i>Back to Home</a>
</main>

<script>
  // Loading
  window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 1200);
  });

  // Particles
  (function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = (1 + Math.random() * 2) + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = (12 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      container.appendChild(p);
    }
  })();
</script>
</body>
</html>
